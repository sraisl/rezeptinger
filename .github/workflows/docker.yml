name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  lint:
    name: Dockerfile lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v4.0.0
        with:
          dockerfile: Dockerfile

      - name: Validate Compose config
        run: |
          docker compose config
          docker compose --profile worker config

  security-scan:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build local image for scanning
        run: docker build -t rezeptinger:ci .

      - name: Run Trivy SARIF scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: rezeptinger:ci
          format: sarif
          output: trivy-results.sarif
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce Trivy vulnerability gate
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: rezeptinger:ci
          format: table
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs:
      - lint
      - security-scan

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        run: |
          version="${GITHUB_REF_NAME#v}"
          cat > release-summary.md <<EOF
          ## Container image

          Published to GHCR:

          - \`${{ steps.image.outputs.name }}:${version}\`
          - \`${{ steps.image.outputs.name }}:latest\`

          ## Docker Compose

          \`\`\`bash
          docker compose pull
          docker compose --profile worker up -d
          \`\`\`
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="$(cat release-summary.md)"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$notes" \
            --verify-tag \
            --generate-notes

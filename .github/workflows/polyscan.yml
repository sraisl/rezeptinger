name: polyscan sast

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  polyscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: PolyScan
        id: scan
        uses: sraisl/polyscan-action@v4
        with:
          target: "."
          engines: "semgrep,bandit,eslint,spotbugs,trivy,detekt,gitleaks"
          gate: "false"
          sarif: "true"
          sbom: "true"
          upload-artifacts: "true"

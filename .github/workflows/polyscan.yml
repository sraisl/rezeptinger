name: polyscan sast

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  polyscan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: PolyScan
        id: scan
        uses: sraisl/polyscan-action@v2
        with:
          target: "."
          engines: "semgrep,bandit,eslint"   # add "spotbugs" for Java/Kotlin
          gate: "false"
          sarif: "true"
          sbom: "true"
          upload-artifacts: "true"   # SARIF + SBOM + summary land as a workflow artifact

      - name: Show totals
        run: |
          echo "total=${{ steps.scan.outputs.total }}"
          echo "high=${{ steps.scan.outputs.high }}"
          echo "gate-passed=${{ steps.scan.outputs.gate-passed }}"

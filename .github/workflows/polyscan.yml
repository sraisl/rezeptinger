name: polyscan sast

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  polyscan:
      runs-on: ubuntu-latest
      permissions:
        security-events: write   # upload SARIF to code scanning
        contents: read
      steps:
        - uses: actions/checkout@v7

        - name: PolyScan self-scan
          uses: sraisl/polyscan@v3
          with:
            target: "."
            engines: "semgrep,bandit,eslint"   # add "spotbugs" for Java/Kotlin
            format: "sarif"

        - name: Upload SARIF to GitHub code scanning
          if: always()
          uses: github/codeql-action/upload-sarif@v4
          with:
            sarif_file: polyscan.sarif

        - name: Job Summary
          if: always()
          run: |
            if [ -f polyscan-summary.md ]; then
              cat polyscan-summary.md >> "$GITHUB_STEP_SUMMARY"
            else
              echo "PolyScan produced no summary file." >> "$GITHUB_STEP_SUMMARY"
            fi
